{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}Login | 3D Artist Portfolio{% endblock %}

{% block content %}
<div class="container pt-5 mt-5 mb-5 pb-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="glass-card p-4 p-md-5">
                <div class="text-center mb-4">
                    <i class="fas fa-user-circle fa-3x mb-3" style="color: var(--primary-color);"></i>
                    <h2 class="fw-bold">Welcome Back</h2>
                    <p class="text-muted">Login to access your dashboard</p>
                </div>
                
                <form method="post">
                    {% csrf_token %}
                    {{ form|crispy }}
                    <button type="submit" class="btn btn-luxury w-100 py-2 mt-4">Login</button>
                </form>
                
                <div class="text-center mt-4 pt-3 border-top border-secondary">
                    <p class="text-muted small mb-0">Don't have an account? <a href="{% url 'register' %}" class="text-decoration-none" style="color: var(--primary-color);">Register here</a></p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
